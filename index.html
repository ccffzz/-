<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心理空间：网络与"我"</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 页面头部 -->
  <header class="site-header">
    <h1 class="site-title">心理空间：网络与"我"</h1>
    <p class="site-subtitle">点击房间中的小人，开启一段内心对话</p>
  </header>

  <!-- 房间场景 -->
  <main class="room-wrapper">
    <div class="room-container" id="room">
      <!-- 地板 -->
      <div class="room-floor">
        <div class="floor-star floor-star-1"></div>
        <div class="floor-star floor-star-2"></div>
        <div class="floor-star floor-star-3"></div>
        <div class="floor-star floor-star-4"></div>
        <div class="floor-star floor-star-5"></div>
        <div class="floor-star floor-star-6"></div>
        <div class="floor-star floor-star-7"></div>
        <div class="floor-star floor-star-8"></div>
        <div class="floor-star floor-star-9"></div>
        <div class="floor-star floor-star-10"></div>
        <div class="floor-star floor-star-11"></div>
        <div class="floor-star floor-star-12"></div>
        <div class="floor-star floor-star-13"></div>
        <div class="floor-star floor-star-14"></div>
        <div class="floor-star floor-star-15"></div>
        <div class="floor-star floor-star-16"></div>
        <div class="floor-star floor-star-17"></div>
        <div class="floor-star floor-star-18"></div>
        <div class="floor-star floor-star-19"></div>
        <div class="floor-star floor-star-20"></div>
        <div class="floor-star floor-star-21"></div>
        <div class="floor-star floor-star-22"></div>
        <div class="floor-star floor-star-23"></div>
        <div class="floor-star floor-star-24"></div>
        <div class="floor-star floor-star-25"></div>
        <div class="floor-star floor-star-26"></div>
        <div class="floor-star floor-star-27"></div>
        <div class="floor-star floor-star-28"></div>
        <div class="floor-star floor-star-29"></div>
        <div class="floor-star floor-star-30"></div>
      </div>

      <!-- 墙壁层 - 45°等轴俯视三面体结构 -->
      <div class="walls-layer">
        <!-- 上墙（北面） -->
        <div class="wall wall-top">
          <div class="wall-side wall-side-bottom"></div>
          <div class="wall-detail wall-switch-top"></div>
        </div>
        <!-- 左墙（西面） -->
        <div class="wall wall-left">
          <div class="wall-side wall-side-right"></div>
          <div class="wall-detail wall-switch-left"></div>
        </div>
        <!-- 右墙（东面） -->
        <div class="wall wall-right">
          <div class="wall-side wall-side-left"></div>
        </div>
        <!-- 下墙（南面） -->
        <div class="wall wall-bottom">
          <div class="wall-side wall-side-top"></div>
        </div>
      </div>

      <!-- 环境光遮蔽(AO)装饰层 -->
      <div class="ao-layer">
        <div class="ao-corner ao-corner-tl"></div>
        <div class="ao-corner ao-corner-tr"></div>
        <div class="ao-corner ao-corner-bl"></div>
        <div class="ao-corner ao-corner-br"></div>
        <div class="ao-edge ao-edge-left"></div>
        <div class="ao-edge ao-edge-bottom"></div>
      </div>

      <!-- 斜向光束效果层 -->
      <div class="light-beam-layer">
        <div class="light-beam light-beam-1"></div>
        <div class="light-beam light-beam-2"></div>
        <div class="light-beam light-beam-3"></div>
      </div>

      <!-- 家具层 -->
      <div class="furniture-layer">
        <!-- 上方长条柜 (TV/media stand) -->
        <div class="furniture credenza-top">
          <div class="cabinet-side cabinet-side-right"></div>
          <div class="cabinet-top-surface"></div>
          <div class="tv-monitor"></div>
        </div>

        <!-- 左侧竖向沙发 -->
        <div class="furniture sofa-left">
          <div class="sofa-arm sofa-arm-top"></div>
          <div class="sofa-cushion sofa-cushion-1"></div>
          <div class="sofa-cushion sofa-cushion-2"></div>
          <div class="sofa-cushion sofa-cushion-3"></div>
          <div class="sofa-arm sofa-arm-bottom"></div>
        </div>

        <!-- 中央餐桌 -->
        <div class="furniture dining-table">
          <div class="cabinet-side cabinet-side-bottom"></div>
          <div class="table-leg-tl"></div>
          <div class="table-leg-tr"></div>
          <div class="table-leg-bl"></div>
          <div class="table-leg-br"></div>
          <!-- 上排盘子（沿桌顶边） -->
          <div class="table-item table-plate table-plate-1"></div>
          <div class="table-item table-plate table-plate-2"></div>
          <div class="table-item table-plate table-plate-3"></div>
          <div class="table-item table-plate table-plate-4"></div>
          <!-- 下排盘子（沿桌底边） -->
          <div class="table-item table-plate table-plate-1b"></div>
          <div class="table-item table-plate table-plate-2b"></div>
          <div class="table-item table-plate table-plate-3b"></div>
          <div class="table-item table-plate table-plate-4b"></div>
          <!-- 中央共享大盘 -->
          <div class="table-item table-platter-1"></div>
          <div class="table-item table-platter-2"></div>
          <!-- 杯子 -->
          <div class="table-item table-cup-1"></div>
          <div class="table-item table-cup-2"></div>
          <div class="table-item table-cup-3"></div>
          <div class="table-item table-cup-4"></div>
          <!-- 刀叉组 -->
          <div class="table-item utensil utensil-1"></div>
          <div class="table-item utensil utensil-2"></div>
          <div class="table-item utensil utensil-3"></div>
          <div class="table-item utensil utensil-4"></div>
          <div class="table-item utensil utensil-5"></div>
          <div class="table-item utensil utensil-6"></div>
          <div class="table-item utensil utensil-7"></div>
          <div class="table-item utensil utensil-8"></div>
          <!-- 食物细节 -->
          <div class="table-item food-bread food-bread-1"></div>
          <div class="table-item food-bread food-bread-2"></div>
          <div class="table-item food-fruit food-fruit-1"></div>
          <div class="table-item food-fruit food-fruit-2"></div>
        </div>

        <!-- 8把椅子 - 1+3+3+1布局 -->
        <!-- 上排3把 -->
        <div class="furniture chair chair-top-1"><div class="cabinet-side cabinet-side-bottom"></div></div>
        <div class="furniture chair chair-top-2"><div class="cabinet-side cabinet-side-bottom"></div></div>
        <div class="furniture chair chair-top-3"><div class="cabinet-side cabinet-side-bottom"></div></div>
        <!-- 下排3把 -->
        <div class="furniture chair chair-bottom-1"><div class="cabinet-side cabinet-side-bottom"></div></div>
        <div class="furniture chair chair-bottom-2"><div class="cabinet-side cabinet-side-bottom"></div></div>
        <div class="furniture chair chair-bottom-3"><div class="cabinet-side cabinet-side-bottom"></div></div>
        <!-- 左端1把（空椅） -->
        <div class="furniture chair chair-left-end"><div class="cabinet-side cabinet-side-bottom"></div></div>
        <!-- 右端1把（空椅） -->
        <div class="furniture chair chair-right-end"><div class="cabinet-side cabinet-side-bottom"></div></div>

        <!-- 下方水平沙发 -->
        <div class="furniture sofa-bottom">
          <div class="cabinet-side cabinet-side-bottom"></div>
        </div>

        <!-- 下方右侧长条柜 -->
        <div class="furniture credenza-bottom-right">
          <div class="cabinet-side cabinet-side-right"></div>
          <div class="cabinet-top-surface"></div>
        </div>

        <!-- 右侧电脑桌1 (上方) -->
        <div class="furniture desk-1">
          <div class="cabinet-side cabinet-side-right"></div>
          <div class="cabinet-top-surface"></div>
          <div class="desk-monitor"></div>
          <div class="desk-pc-case"></div>
          <div class="desk-keyboard"></div>
          <div class="desk-mouse"></div>
        </div>

        <!-- 电脑桌1座椅 - 11号小人身后 -->
        <div class="desk-chair desk-chair-1"></div>

        <!-- 右侧电脑桌2 (下方) -->
        <div class="furniture desk-2">
          <div class="cabinet-side cabinet-side-right"></div>
          <div class="cabinet-top-surface"></div>
          <div class="desk-monitor"></div>
          <div class="desk-pc-case"></div>
          <div class="desk-keyboard"></div>
          <div class="desk-mouse"></div>
        </div>

        <!-- 电脑桌2座椅 - 12号小人身后 -->
        <div class="desk-chair desk-chair-2"></div>


        <!-- 墙壁灯光 -->
        <div class="furniture wall-light-1"></div>
        <div class="furniture wall-light-2"></div>
      </div>

      <!-- 粒子效果层 -->
      <div class="particles-container" id="particles"></div>

      <!-- 角色层 -->
      <div class="characters-layer">
        <!-- ===== 6个坐姿角色（餐桌上排3+下排3） ===== -->

        <!-- 上排3人（面向下/朝桌子）- 精确对齐椅子 -->
        <div class="seated-character" data-id="3" style="left: 330px; top: 127px; --delay: 0s;">
          <img src="images/坐姿3.png" alt="连接者">
        </div>
        <div class="seated-character" data-id="4" style="left: 470px; top: 127px; --delay: 0.2s;">
          <img src="images/坐姿4.png" alt="反思者">
        </div>
        <div class="seated-character" data-id="5" style="left: 610px; top: 127px; --delay: 0.4s;">
          <img src="images/坐姿5.png" alt="探索者">
        </div>

        <!-- 下排3人（面向上/朝桌子）- 精确对齐椅子 -->
        <div class="seated-character" data-id="6" style="left: 330px; top: 331px; --delay: 0.6s;">
          <img src="images/坐姿6.png" alt="倾听者">
        </div>
        <div class="seated-character" data-id="7" style="left: 470px; top: 331px; --delay: 0.8s;">
          <img src="images/坐姿7.png" alt="匿名者">
        </div>
        <div class="seated-character" data-id="8" style="left: 610px; top: 331px; --delay: 1.0s;">
          <img src="images/坐姿8.png" alt="表演者">
        </div>

        <!-- 左端1人（面向右/朝桌子）- 精确对齐椅子 -->
        <div class="seated-character" data-id="16" style="left: 232px; top: 228px; --delay: 1.2s;">
          <img src="images/坐姿左.png" alt="左端来客">
        </div>

        <!-- 右端1人（面向左/朝桌子）- 精确对齐椅子 -->
        <div class="seated-character" data-id="17" style="left: 716px; top: 228px; --delay: 1.4s;">
          <img src="images/坐姿右.png" alt="右端来客">
        </div>

        <!-- ===== 7个站立角色 ===== -->

        <!-- 表达者 - 左侧沙发上段前方 -->
        <div class="pixel-character" data-id="1" style="left: 75px; top: 105px; --delay: 0s;">
          <img src="images/小人1.png" alt="表达者">
        </div>

        <!-- 观察者 - 左侧沙发中段前方 -->
        <div class="pixel-character" data-id="2" style="left: 75px; top: 225px; --delay: 0.25s;">
          <img src="images/小人2.png" alt="观察者">
        </div>

        <!-- 守护者 - 左侧沙发下段前方 -->
        <div class="pixel-character" data-id="15" style="left: 75px; top: 345px; --delay: 0.5s;">
          <img src="images/小人15.png" alt="守护者">
        </div>

        <!-- 上方电脑桌前坐姿（黑西装红发）- 桌子下方留空隙 -->
        <div class="pixel-character" data-id="11" style="left: 827px; top: 156px; --delay: 0.75s;">
          <img src="images/小人11.png" alt="构建者">
        </div>

        <!-- 下方电脑桌前坐姿（橙色卫衣）- 桌子下方留空隙 -->
        <div class="pixel-character" data-id="12" style="left: 827px; top: 386px; --delay: 1.0s;">
          <img src="images/小人12.png" alt="游荡者">
        </div>

        <!-- 守望者 - 下方沙发左侧 -->
        <div class="pixel-character" data-id="13" style="left: 140px; top: 448px; --delay: 1.25s;">
          <img src="images/小人13.png" alt="守望者">
        </div>

        <!-- 共鸣者 - 下方沙发右侧 -->
        <div class="pixel-character" data-id="14" style="left: 240px; top: 448px; --delay: 1.5s;">
          <img src="images/小人14.png" alt="共鸣者">
        </div>
      </div>

      <!-- 光影层 -->
      <div class="lighting-layer"></div>
    </div>
  </main>

  <!-- 弹窗 -->
  <div id="popup-overlay" class="popup-overlay">
    <div id="popup-container" class="popup-container">
      <div class="popup-header">
        <span id="popup-title" class="popup-title"></span>
        <button id="popup-close" class="popup-close">&times;</button>
      </div>
      <div class="popup-content">
        <p id="popup-text"></p>
      </div>
    </div>
  </div>

  <!-- 横屏提示黑幕 + BGM触发 -->
  <div id="rotate-hint" class="rotate-hint">
    <span class="rotate-hint-text">建议切换至横屏浏览体验更佳</span>
    <span class="rotate-hint-sub">点击任意位置开始</span>
  </div>

  <!-- 巨幕闭幕动画 -->
  <div id="curtain-overlay" class="curtain-overlay">
    <!-- 顶部横帘 - 固定不动 -->
    <div id="curtain-top" class="curtain-top">
      <!-- 多层叠加增强厚度 -->
      <div class="curtain-top-layer curtain-top-layer-2"></div>
      <div class="curtain-top-layer curtain-top-layer-3"></div>
      <!-- 金色流苏 -->
      <div class="curtain-tassel"></div>
    </div>
    <!-- 左右主帷幕 - 合拢动画 -->
    <div id="curtain-left" class="curtain curtain-left"></div>
    <div id="curtain-right" class="curtain curtain-right"></div>
  </div>

  <!-- 页脚 -->
  <footer class="site-footer">
    <p>心理空间：网络与"我" | 像素艺术心理体验</p>
  </footer>

  <!-- 自定义鼠标 - 卡通白手套食指 -->
  <div id="custom-cursor" class="custom-cursor">
    <svg class="glove-svg" viewBox="0 0 32 32" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- 手套阴影 -->
      <path d="M8 28C8 28 6 30 4 30C2 30 1 29 1 28C1 27 2 26 3 26L6 25" fill="rgba(0,0,0,0.12)"/>
      <!-- 手腕 -->
      <rect x="9" y="24" width="14" height="7" rx="2" fill="#e8e8e8" stroke="#d0d0d0" stroke-width="0.5"/>
      <!-- 袖口线 -->
      <line x1="10" y1="24" x2="22" y2="24" stroke="#c8c8c8" stroke-width="1.2"/>
      <!-- 手掌 -->
      <path d="M7 14C7 12 8 10 10 10L22 10C24 10 25 12 25 14L24 24L8 24L7 14Z" fill="#f5f5f5" stroke="#d8d8d8" stroke-width="0.5"/>
      <!-- 拇指 -->
      <path d="M7 14C7 14 4 13 3 15C2 17 3 19 5 19L7 18" fill="#f0f0f0" stroke="#d8d8d8" stroke-width="0.5"/>
      <!-- 食指 -->
      <path d="M10 10L10 3C10 1.5 11 0.5 12.5 0.5C14 0.5 15 1.5 15 3L15 10" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/>
      <!-- 中指 -->
      <path d="M15 10L15 4C15 2.5 16 1.5 17.5 1.5C19 1.5 20 2.5 20 4L20 10" fill="#f5f5f5" stroke="#d8d8d8" stroke-width="0.5"/>
      <!-- 无名指 -->
      <path d="M20 10L20 5C20 3.5 21 2.5 22.5 2.5C24 2.5 25 3.5 25 5L25 14" fill="#f0f0f0" stroke="#d8d8d8" stroke-width="0.5"/>
      <!-- 食指高光 -->
      <path d="M11 3L11 8C11 8 11.5 7 12.5 7C13.5 7 14 7.5 14 8L14 3C14 2 13.5 1.5 12.5 1.5C11.5 1.5 11 2 11 3Z" fill="rgba(255,255,255,0.6)"/>
      <!-- 手掌高光 -->
      <path d="M8 12L9 20L14 20L13 12Z" fill="rgba(255,255,255,0.2)"/>
    </svg>
  </div>

  <!-- 背景音乐 BGM - 自动循环播放 -->
  <audio id="bgm" loop preload="auto">
    <source src="网站bgm.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
